server.port=8082
spring.application.name=ivr-service

# Service Communication URLs
app.user-service.url=http://localhost:8080/users
app.payment-service.url=http://localhost:8081/payments

# Twilio Configuration
# Reemplaza estas variables con tus credenciales reales o usa variables de entorno
twilio.account-sid=${TWILIO_ACCOUNT_SID:your_account_sid_here}
twilio.auth-token=${TWILIO_AUTH_TOKEN:your_auth_token_here}
twilio.phone-number=${TWILIO_PHONE_NUMBER:your_phone_number_here}
