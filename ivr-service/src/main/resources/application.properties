server.port=8082
spring.application.name=ivr-service

# Service Communication URLs
app.user-service.url=http://localhost:8080/users
app.payment-service.url=http://localhost:8081/payments

# Twilio Configuration (Configura estas variables en tu entorno local)
twilio.account-sid=${TWILIO_ACCOUNT_SID:AC_PLACEHOLDER}
twilio.auth-token=${TWILIO_AUTH_TOKEN:TOKEN_PLACEHOLDER}
twilio.phone-number=${TWILIO_PHONE_NUMBER:+10000000000}
